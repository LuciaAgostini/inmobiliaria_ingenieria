{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Registro
                </h2>

                <form method="post">

                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert alert-danger">
                        {{ form.errors }}
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label>Nombre</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label>Contraseña</label>
                        {{ form.password1 }}
                    </div>

                    <div class="mb-3">
                        <label>Confirmar contraseña</label>
                        {{ form.password2 }}
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Registrarse
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
