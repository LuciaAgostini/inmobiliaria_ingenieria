{% extends 'base.html' %}

{% block content %}

<h2>Clientes</h2>

<a href="{% url 'crear_cliente' %}">
    ➕ Nuevo Cliente
</a>

<hr>

<ul>
{% for cliente in clientes %}
    <li>
        {{ cliente }}

        <a href="{% url 'editar_cliente' cliente.id %}">
            Editar
        </a>

        <a href="{% url 'eliminar_cliente' cliente.id %}">
            Eliminar
        </a>
    </li>
{% empty %}
    <li>No hay clientes registrados.</li>
{% endfor %}
</ul>

{% endblock %}
